name: macOS Crash Report Test

on:
  workflow_dispatch:

jobs:
  crash-test:
    runs-on: macos-latest
    permissions: {}

    steps:
      - name: Write segfault C source
        run: |
          cat > /tmp/segv.c <<'EOF'
          int main(void) {
            volatile int *p = 0;
            *p = 42;
            return 0;
          }
          EOF

      - name: Compile segfault binary
        run: clang /tmp/segv.c -o /tmp/segv-test

      - name: Run segfault binary and capture exit code
        run: |
          set +e
          /tmp/segv-test
          testrc=$?
          set -e
          echo "segv test rc=$testrc"
          # On macOS/Unix, SIGSEGV (signal 11) produces exit code 139 (128 + 11)
          if [ "$testrc" -ne 139 ]; then
            echo "WARNING: expected exit code 139 (SIGSEGV), got $testrc"
          else
            echo "Exit code confirms SIGSEGV crash as expected"
          fi

      - name: Wait for crash report to be written
        # macOS writes crash reports asynchronously; a short delay ensures the
        # report file is flushed to disk before we attempt to locate it.
        run: sleep 5

      - name: Find crash reports
        run: |
          find "$HOME/Library/Logs/DiagnosticReports" /Library/Logs/DiagnosticReports \
            -type f \( -name '*.ips' -o -name '*.crash' \) -mmin -5 2>/dev/null -print || true
